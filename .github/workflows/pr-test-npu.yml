name: PR Test for SGL-KERNEL-NPU (Ascend NPU)

on:
  pull_request:
    branches: [ main ]
    paths:
      - "build.sh"
      - "cmake/**"
      - "python/**"
      - "csrc/**"
      - "tests/**"
      - "scripts/**"
      - ".github/workflows/pr-test-npu.yml"
  workflow_dispatch:

concurrency:
  group: pr-test-npu-${{ github.ref }}
  cancel-in-progress: true

jobs:
  get-changed-files:
    name: Check changed files
    runs-on: ubuntu-latest
    outputs:
      ops2_changed: ${{ steps.match-groups.outputs.ops2_any_changed }}
      ops_changed: ${{ steps.match-groups.outputs.ops_any_changed }}
      common_changed: ${{ steps.match-groups.outputs.common_any_changed }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Match changed files
        id: match-groups
        uses: tj-actions/changed-files@v45
        with:
          files_yaml: |
            ops:
              - csrc/deepep/ops/**
            ops2:
              - csrc/deepep/ops2/**
            common:
              - csrc/**
              - '!csrc/deepep/ops/**'
              - '!csrc/deepep/ops2/**'
              - build.sh
              - cmake/**
              - python/**
              - tests/**
              - scripts/**
              - .github/workflows/pr-test-npu.yml

  test-all-build:
    needs: get-changed-files
    if: |
      github.event_name == 'workflow_dispatch' || (
        (github.repository == 'sgl-project/sgl-kernel-npu' || github.event_name == 'pull_request') &&
        github.event.pull_request.draft == false &&
        (needs.get-changed-files.outputs.ops_changed == 'true' || needs.get-changed-files.outputs.common_changed == 'true')
      )
    runs-on: linux-aarch64-a3-16
    container:
      image: swr.cn-southwest-2.myhuaweicloud.com/base_image/ascend-ci/cann:9.0.0-a3-ubuntu22.04-py3.11
    env:
      TORCH_CACHE_URL: "http://cache-service.nginx-pypi-cache.svc.cluster.local/whl/cpu"
      PYPI_CACHE_URL: "http://cache-service.nginx-pypi-cache.svc.cluster.local/pypi/simple"
      GITHUB_PROXY_URL: "https://gh-proxy.test.osinfra.cn/"
      UV_INDEX_URL: http://cache-service.nginx-pypi-cache.svc.cluster.local/pypi/simple
    steps:
      - name: Clean git config
        run: |
          CONFIG_KEY='http.https://gh-proxy.test.osinfra.cn/.extraheader'
          git config --global --unset "$CONFIG_KEY" || true

      - name: Clean workspace
        run: |
          sudo rm -rf --one-file-system "$GITHUB_WORKSPACE"/* "$GITHUB_WORKSPACE"/.* 2>/dev/null || true

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          clean: true
          submodules: recursive

      - name: Get build hash
        id: get_build_hash
        run: |
          BUILD_HASH=$(find ./csrc ./cmake ./python ./build.sh ./CMakeLists.txt \
            -type f -not -path '*/.*' 2>/dev/null | sort | xargs sha256sum | sha256sum | awk '{print $1}')
          echo "BUILD_HASH=$BUILD_HASH" >> $GITHUB_OUTPUT

          CANN_RAW=$(cat /usr/local/Ascend/ascend-toolkit/latest/version.cfg 2>/dev/null || echo "unknown")
          CANN_VERSION=$(echo "$CANN_RAW" | tr -cd '[:alnum:].-' | head -c 32)
          [ -z "$CANN_VERSION" ] && CANN_VERSION="unknown"
          echo "CANN_VERSION=$CANN_VERSION" >> $GITHUB_OUTPUT

      - name: Restore build cache
        id: cache-build
        uses: runs-on/cache@v4
        with:
          path: output
          key: sgl-kernel-npu-build-v2-${{ runner.os }}-a3-cann${{ steps.get_build_hash.outputs.CANN_VERSION }}-${{ steps.get_build_hash.outputs.BUILD_HASH }}

      - name: Install dependencies
        run: |
          # speed up by using infra cache services
          CACHING_URL="cache-service.nginx-pypi-cache.svc.cluster.local"
          sed -Ei "s@(ports|archive).ubuntu.com@${CACHING_URL}:8081@g" /etc/apt/sources.list
          pip config set global.index-url http://${CACHING_URL}/pypi/simple
          pip config set global.trusted-host ${CACHING_URL}
          pip install uv

          bash scripts/npu_ci_install_dependency.sh

      - name: Prepare Deepep
        run: bash scripts/prepare_deepep_in_container.sh

      # === A3 机型 test_intranode.py ===
      - name: Run test intranode (A3 - 8 processes)
        timeout-minutes: 10
        env:
          HCCL_BUFFSIZE: 5000
        run: |
          python3 $GITHUB_WORKSPACE/tests/python/deepep/test_intranode.py --num-processes=8 --num-tokens=8000

      - name: Run test intranode (A3 - 16 processes)
        timeout-minutes: 10
        env:
          HCCL_BUFFSIZE: 5000
        run: |
          python3 $GITHUB_WORKSPACE/tests/python/deepep/test_intranode.py --num-processes=16 --num-tokens=4096 --hidden=4096 --num-topk=8 --num-experts=64

      # === A3 机型 test_low_latency.py ===
      - name: Run test low latency (A3 - 8 processes)
        timeout-minutes: 10
        env:
          HCCL_BUFFSIZE: 1913
        run: |
          python3 $GITHUB_WORKSPACE/tests/python/deepep/test_low_latency.py --num-processes=8
          python3 $GITHUB_WORKSPACE/tests/python/deepep/test_low_latency.py --num-processes=8 --num-tokens=1

      - name: Run test low latency (A3 - 8 processes, 512 tokens)
        timeout-minutes: 10
        env:
          HCCL_BUFFSIZE: 3825
        run: |
          python3 $GITHUB_WORKSPACE/tests/python/deepep/test_low_latency.py --num-processes=8 --num-tokens=512

      - name: Run test low latency (A3 - 2 processes)
        timeout-minutes: 10
        env:
          HCCL_BUFFSIZE: 1913
        run: |
          python3 $GITHUB_WORKSPACE/tests/python/deepep/test_low_latency.py --num-processes=2

      - name: Run test low latency (A3 - topk=16)
        timeout-minutes: 10
        env:
          HCCL_BUFFSIZE: 1969
        run: |
          python3 $GITHUB_WORKSPACE/tests/python/deepep/test_low_latency.py --num-processes=8 --num-topk=16

      - name: Run test low latency (A3 - experts=2)
        timeout-minutes: 10
        env:
          HCCL_BUFFSIZE: 7481
        run: |
          python3 $GITHUB_WORKSPACE/tests/python/deepep/test_low_latency.py --num-processes=2 --num-topk=1 --num-experts=2

      - name: Run test low latency (A3 - experts=1024)
        timeout-minutes: 10
        env:
          HCCL_BUFFSIZE: 7481
        run: |
          python3 $GITHUB_WORKSPACE/tests/python/deepep/test_low_latency.py --num-experts=1024 --num-processes=8

      - name: Run test low latency (A3 - dynamic tokens)
        timeout-minutes: 10
        env:
          HCCL_BUFFSIZE: 2300
        run: |
          python3 $GITHUB_WORKSPACE/tests/python/deepep/test_low_latency.py --num-processes=8 --enable-dynamic-tokens

      - name: Run test low latency (A3 - 16 processes)
        timeout-minutes: 10
        env:
          HCCL_BUFFSIZE: 4500
        run: |
          python3 $GITHUB_WORKSPACE/tests/python/deepep/test_low_latency.py --num-processes=16

      - name: Run test low latency (A3 - 16 processes, large params)
        timeout-minutes: 10
        env:
          HCCL_BUFFSIZE: 4500
        run: |
          python3 $GITHUB_WORKSPACE/tests/python/deepep/test_low_latency.py --num-processes=16 --num-tokens=128 --hidden=4096 --num-topk=8 --num-experts=64

      - name: Run test low latency (A3 - 16 processes, larger params)
        timeout-minutes: 10
        env:
          HCCL_BUFFSIZE: 5000
        run: |
          python3 $GITHUB_WORKSPACE/tests/python/deepep/test_low_latency.py --num-processes=16 --num-tokens=512 --hidden=7168 --num-topk=9 --num-experts=256

      # === A3 机型 test_normal_and_low_latency.py ===
      - name: Run test normal and low latency (A3 - 8 processes)
        timeout-minutes: 10
        env:
          HCCL_BUFFSIZE: 5000
        run: |
          python3 $GITHUB_WORKSPACE/tests/python/deepep/test_normal_and_low_latency.py --num-processes=8

      - name: Run test normal and low latency (A3 - 2 processes)
        timeout-minutes: 10
        env:
          HCCL_BUFFSIZE: 3000
        run: |
          python3 $GITHUB_WORKSPACE/tests/python/deepep/test_normal_and_low_latency.py --num-processes=2 --test-loop=100

      - name: Run test normal and low latency (A3 - small tokens)
        timeout-minutes: 10
        env:
          HCCL_BUFFSIZE: 5000
        run: |
          python3 $GITHUB_WORKSPACE/tests/python/deepep/test_normal_and_low_latency.py --normal-num-tokens=1 --low-latency-num-tokens=1 --test-loop=100 --num-processes=8

      - name: Run test normal and low latency (A3 - large tokens)
        timeout-minutes: 10
        env:
          HCCL_BUFFSIZE: 5000
        run: |
          python3 $GITHUB_WORKSPACE/tests/python/deepep/test_normal_and_low_latency.py --normal-num-tokens=8000 --low-latency-num-tokens=512 --test-loop=100 --num-processes=8

      - name: Run test normal and low latency (A3 - 16 processes)
        timeout-minutes: 10
        env:
          HCCL_BUFFSIZE: 5000
        run: |
          python3 $GITHUB_WORKSPACE/tests/python/deepep/test_normal_and_low_latency.py --normal-num-tokens=8000 --low-latency-num-tokens=512 --test-loop=100 --num-processes=16

      # === A3 机型 test_combine.py ===
      - name: Run test combine (A3 - 8 processes)
        timeout-minutes: 10
        env:
          HCCL_BUFFSIZE: 5000
        run: |
          python3 $GITHUB_WORKSPACE/tests/python/deepep/test_combine.py --num-processes=8

      - name: Run test combine (A3 - low_latency, 8 processes)
        timeout-minutes: 10
        env:
          HCCL_BUFFSIZE: 5000
        run: |
          python3 $GITHUB_WORKSPACE/tests/python/deepep/test_combine.py --test-type="low_latency" --num-processes=8

      - name: Run test combine (A3 - 16 processes)
        timeout-minutes: 10
        env:
          HCCL_BUFFSIZE: 5000
        run: |
