name: Daily Enumerate Tests (Ascend NPU)

on:
  schedule:
    - cron: "0 16 * * *"
  pull_request:
    branches: [ main ]
    paths:
      - ".github/workflows/daily-build-test.yml"
      - "scripts/enumerate_test_*.sh"
  workflow_dispatch:

concurrency:
  group: daily-enumerate-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run-daily-tests:
    name: ${{ matrix.test_type == 'intranode' && 'Intranode' || 'Low Latency' }} (CANN ${{ matrix.cann_version }}, ${{ matrix.hardware }})
    runs-on: ${{ matrix.hardware == 'a3' && 'linux-aarch64-a3-16' || 'linux-aarch64-a2-8' }}
    container:
      image: swr.cn-southwest-2.myhuaweicloud.com/base_image/ascend-ci/cann:${{ matrix.cann_version }}-${{ matrix.hardware == 'a3' && 'a3' || '910b' }}-ubuntu22.04-py3.11
    timeout-minutes: ${{ matrix.test_type == 'intranode' && 350 || 330 }}
    env:
      TORCH_CACHE_URL: "http://cache-service.nginx-pypi-cache.svc.cluster.local/whl/cpu"
      PYPI_CACHE_URL: "http://cache-service.nginx-pypi-cache.svc.cluster.local/pypi/simple"
      GITHUB_PROXY_URL: "https://gh-proxy.test.osinfra.cn/"
      UV_INDEX_URL: http://cache-service.nginx-pypi-cache.svc.cluster.local/pypi/simple
    strategy:
      fail-fast: false
      matrix:
        test_type: [intranode, low_latency]
        cann_version: [9.0.0, 8.5.0]
        hardware: [a3, a2]
    steps:
      - name: Clean git config
        run: |
          CONFIG_KEY='http.https://gh-proxy.test.osinfra.cn/.extraheader'
          git config --global --unset "$CONFIG_KEY" || true

      - name: Clean workspace
        run: |
          sudo rm -rf --one-file-system "$GITHUB_WORKSPACE"/* "$GITHUB_WORKSPACE"/.* 2>/dev/null || true

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          clean: true

      - name: Install dependencies
        run: |
          CACHING_URL="cache-service.nginx-pypi-cache.svc.cluster.local"
          sed -Ei "s@(ports|archive).ubuntu.com@${CACHING_URL}:8081@g" /etc/apt/sources.list
          pip config set global.index-url http://${CACHING_URL}/pypi/simple
          pip config set global.trusted-host ${CACHING_URL}
          pip install uv
          bash scripts/npu_ci_install_dependency.sh

      - name: Prepare Deepep
        run: bash scripts/prepare_deepep_in_container.sh -a ${{ matrix.hardware == 'a3' && 'deepep' || 'deepep2' }}

      - name: Run enumerate test
        timeout-minutes: ${{ matrix.test_type == 'intranode' && 340 || 300 }}
        env:
          HCCL_BUFFSIZE: ${{ matrix.hardware == 'a3' && 4096 || 3000 }}
          TEST_ENV: daily-build
        run: |
          SCRIPT_NAME="enumerate_test_${{ matrix.test_type }}${{ matrix.test_type == 'low_latency' && (matrix.hardware == 'a2' && '_a2' || '') || '' }}.sh"
          echo "Starting daily enumerate ${{ matrix.test_type }} test (${{ matrix.cann_version }}, ${{ matrix.hardware }}) at $(date)"
          chmod +x scripts/${SCRIPT_NAME}
          bash scripts/${SCRIPT_NAME}
          echo "Completed daily enumerate ${{ matrix.test_type }} test at $(date)"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.test_type }}-${{ matrix.cann_version }}-${{ matrix.hardware }}-results-${{ github.sha }}-${{ github.run_id }}
          path: |
            test-results/
            logs/
          retention-days: 30

  finish:
    if: always()
    needs: [ run-daily-tests ]
    runs-on: ubuntu-latest
    steps:
      - name: Generate test report
        run: |
          echo "## Daily Enumerate Tests Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Overall Status**: ${{ needs.run-daily-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "**Execution Time**: $(date)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Workflow Run**: [$GITHUB_RUN_ID](https://github.com/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "See individual job status in the run details above." >> $GITHUB_STEP_SUMMARY